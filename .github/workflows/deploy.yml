name: Build and Deploy to Swarm

on:
  push:
    branches: ["main"]

env:
  NODE_IMAGE: harikayarabala/client-a-node
  PY_IMAGE: harikayarabala/client-b-python

jobs:
  build_push_deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Buildx is still useful for multi-arch, even on self-hosted
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Node image (SHA tag)
        uses: docker/build-push-action@v6
        with:
          context: ./client-a-node-app
          file: ./client-a-node-app/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.NODE_IMAGE }}:${{ github.sha }}

      - name: Build & push Python image (SHA tag)
        uses: docker/build-push-action@v6
        with:
          context: ./client-b-python-app
          file: ./client-b-python-app/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.PY_IMAGE }}:${{ github.sha }}

      # ✅ Local deploy on the Swarm manager (self-hosted runner)
      - name: Deploy (Swarm rolling update)
        run: |
          set -e
          echo "Deploying SHA: ${{ github.sha }}"

          docker service update \
            --image ${{ env.NODE_IMAGE }}:${{ github.sha }} \
            appstack_client-a-node

          docker service update \
            --image ${{ env.PY_IMAGE }}:${{ github.sha }} \
            appstack_client-b-python

          docker stack services appstack
