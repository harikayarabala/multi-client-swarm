name: Build and Deploy to Swarm (EC2)

on:
  push:
    branches: ["main"]

env:
  NODE_IMAGE: harikayarabala/client-a-node
  PY_IMAGE: harikayarabala/client-b-python

jobs:
  build_push_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Node image (SHA tag)
        uses: docker/build-push-action@v6
        with:
          context: ./client-a-node-app
          file: ./client-a-node-app/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.NODE_IMAGE }}:${{ github.sha }}

      - name: Build & push Python image (SHA tag)
        uses: docker/build-push-action@v6
        with:
          context: ./client-b-python-app
          file: ./client-b-python-app/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.PY_IMAGE }}:${{ github.sha }}

      - name: Deploy to EC2 Swarm
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "Deploying SHA: ${{ github.sha }}"

            docker service update \
              --image harikayarabala/client-a-node:${{ github.sha }} \
              appstack_client-a-node

            docker service update \
              --image harikayarabala/client-b-python:${{ github.sha }} \
              appstack_client-b-python

            docker stack services appstack
